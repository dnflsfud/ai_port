label: exp_news_trend_feature
description: >
  S8 arm: news_trend 센티먼트 피처 1개를 core whitelist에 조건부 추가(ON).
  피처 정의는 기존 코드 그대로(NEWS_SENTIMENT_DAILY_AVG의 5일-21일 rolling
  평균 스프레드). 단일 사전등록, 스윕 없음(trials=1). 정본 iter15_65tkr_reb21_vtg
  + news_trend_feature_enabled 오버라이드만. 게이트(ΔIR>+0.36 & 서브기간 부호
  일관) 통과 시에만 프로덕션 flip.
out_dir: outputs/exp_news_trend_feature
tuning_mode: production
overrides:
  # Model/data baseline pins.
  train_window: 1260
  retrain_freq: 63
  val_window: 126
  prediction_ema_alpha: 0.5
  early_stopping_rounds: 100
  lgbm_params:
    objective: regression
    metric: mse
    learning_rate: 0.02
    num_leaves: 31
    max_depth: 5
    min_child_samples: 60
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.3
    reg_lambda: 2.0
    n_estimators: 800
    verbose: -1
    random_state: 42
  ewma_enabled: true
  ewma_alpha: 0.3
  ewma_min_retrains: 2
  ewma_drop_pct: 0.05
  ewma_min_features: 60
  feature_mode: core
  min_model_trees: 10
  max_degenerate_model_rate: 0.25
  fail_on_degenerate_model_rate: false
  max_tail_ffill_days: 10
  fail_on_stale_tail_ffill: false

  # Benchmark / optimizer / execution pins.
  benchmark_type: cap_weighted
  risk_aversion: 1.0
  turnover_penalty: 0.03
  max_te_annual: 0.045
  max_single_turnover: 0.15
  sector_deviation: 0.10
  cov_lookback: 126
  bm_weight_floor: 0.02
  max_active_share: 0.45
  max_active_share_ceiling: null
  max_weight: 0.15
  max_active_per_stock: 0.04
  use_score_based: false
  portfolio_style: core_satellite
  satellite_budget: 0.225
  satellite_max_per_stock: 0.04
  enforce_score_gated_ow: true
  score_threshold_for_ow: 0.0
  no_trade_band: 0.003
  partial_rebalance_eta: 0.50
  trailing_ic_window: 6
  one_way_tc: 0.0010
  rebalance_freq: 21

  # Mega-cap / proportional-cap controls.
  mega_cap_protection_enabled: true
  mega_cap_bm_threshold: 0.04
  mega_cap_wide_uw_cap: 0.10
  mega_cap_funding_mode: true
  mega_cap_funding_k: 4
  mega_cap_funding_score_max: 0.0
  bm_proportional_cap_enabled: false
  bm_proportional_cap_bm_scale_at_top: 1.5
  bm_proportional_cap_vol_scale_floor: 0.5
  bm_proportional_cap_vol_lookback: 63

  # Post-prediction overlays.
  pead_boost_enabled: true
  pead_boost_weight: 0.30
  pead_decay_days: 7.0
  pead_max_days: 21
  growth_tilt_enabled: true
  growth_tilt_weight: 0.25
  growth_tilt_rev_weight: 0.50
  growth_tilt_fundamental_weight: 0.50
  growth_tilt_eps_skew: 0.50
  growth_tilt_rev_eps_share: 0.50
  growth_tilt_rev_sales_share: 0.50
  growth_tilt_rev_tg_share: 0.00
  signal_stability_lambda: 0.0
  value_trap_gate_enabled: true
  vtg_pe_z_threshold: -0.5
  vtg_momentum_threshold: -0.5
  vtg_accel_threshold: 0.5
  vtg_scale: 0.0

  # Operating guardrails / solver protocol.
  allow_scs_on_ecos_exception: false
  max_name_active_risk_share: 0.35
  max_sector_active_risk_share: 0.75
  dr_alpha_enabled: false

  # S8 (2026-07-07): news_trend sentiment feature arm — the single flag under test.
  news_trend_feature_enabled: true
